; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other option s and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board    = esp32dev
framework = arduino

build_flags = 
  -D I2C_SPEED_FAST=400000

lib_deps =
    https://github.com/sparkfun/SparkFun_MAX3010x_Sensor_Library.git
    https://github.com/adafruit/Adafruit_Sensor.git
    https://github.com/adafruit/Adafruit_ADXL343.git
    https://github.com/NHBSystems/NHB_AD7124.git

upload_port = COM13